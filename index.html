<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StealFun | Rankings</title>
    <link rel="icon" href="https://dbl-discord.usercontent.prism.gg/icons/1207931735485186130/2c52815797cec81dd5c63e3311dac184.png?size=256">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#050505',
                        panel: 'rgba(10, 10, 10, 0.8)',
                        brand: '#FF6700', 
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Import Maps -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.3.1",
                "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
                "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
                "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react,react-dom",
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255, 103, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 103, 0, 0.05) 0%, transparent 40%),
                linear-gradient(to bottom, rgba(5, 5, 5, 0.9), rgba(5, 5, 5, 0.98)), 
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: white; 
            margin: 0; 
            overflow-x: hidden; 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #FF6700; border-radius: 10px; }

        @keyframes shine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .shine-gold { background: linear-gradient(90deg, #ffd700 0%, #fff3a0 25%, #ffd700 50%, #fff3a0 75%, #ffd700 100%); background-size: 200% auto; animation: shine 4s linear infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .shine-silver { background: linear-gradient(90deg, #c0c0c0 0%, #ffffff 25%, #c0c0c0 50%, #ffffff 75%, #c0c0c0 100%); background-size: 200% auto; animation: shine 4s linear infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .shine-bronze { background: linear-gradient(90deg, #cd7f32 0%, #ffbb77 25%, #cd7f32 50%, #ffbb77 75%, #cd7f32 100%); background-size: 200% auto; animation: shine 4s linear infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 103, 0, 0.1); }
        
        .player-card:hover {
            box-shadow: 0 15px 30px -10px rgba(255, 103, 0, 0.15);
        }

        .loader-mask {
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
            Search, Shield, Lock, X, Plus, Trash2, Trophy, 
            Swords, Globe, Flame, Zap, Target, Crosshair, Copy, Key, CheckCircle2, ChevronRight, Menu
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, addDoc, getDoc } from 'firebase/firestore';

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'stealfun-rankings';

        const DEFAULT_PASS = "OpSiond0000";
        const SERVER_IP = "play.stealfun.in";
        const WEB_LOGO = "https://dbl-discord.usercontent.prism.gg/icons/1207931735485186130/2c52815797cec81dd5c63e3311dac184.png?size=256";

        const CATEGORIES = [
            { id: 'overall', name: 'Overall', icon: <Trophy className="w-4 h-4" /> },
            { id: 'sword', name: 'Sword', icon: <Swords className="w-4 h-4" /> },
            { id: 'mace', name: 'Mace', icon: <Zap className="w-4 h-4" /> },
            { id: 'nethpot', name: 'NethPot', icon: <Flame className="w-4 h-4" /> },
            { id: 'crystal', name: 'Crystal', icon: <Target className="w-4 h-4" /> },
            { id: 'uhc', name: 'UHC', icon: <Globe className="w-4 h-4" /> },
            { id: 'smpkit', name: 'SMP Kit', icon: <Crosshair className="w-4 h-4" /> }
        ];

        const TIERS = [
            { id: 'S+', name: 'S+ Tier', color: 'text-red-500', bg: 'bg-red-500/10' },
            { id: 'S', name: 'S Tier', color: 'text-orange-500', bg: 'bg-orange-500/10' },
            { id: 'A', name: 'A Tier', color: 'text-purple-500', bg: 'bg-purple-500/10' },
            { id: 'B', name: 'B Tier', color: 'text-blue-500', bg: 'bg-blue-500/10' },
            { id: 'C', name: 'C Tier', color: 'text-green-500', bg: 'bg-green-500/10' },
            { id: 'D', name: 'D Tier', color: 'text-gray-400', bg: 'bg-gray-400/10' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [players, setPlayers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeCategory, setActiveCategory] = useState('overall');
            const [searchQuery, setSearchQuery] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(false);

            // Mandatory Rule 3: Auth first
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error("Auth init failed", e); }
                };
                initAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            // Mandatory Rule 1 & 2: Firestore listener
            useEffect(() => {
                if (!user) return;
                const pRef = collection(db, 'artifacts', appId, 'public', 'data', 'players');
                const unsubscribe = onSnapshot(pRef, (snap) => {
                    setPlayers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setTimeout(() => setLoading(false), 1200); // Small delay for animation feel
                }, (err) => {
                    console.error("Firestore Error", err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const filteredPlayers = useMemo(() => {
                return players.filter(p => {
                    const matchesSearch = p.name?.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCat = activeCategory === 'overall' || p.category === activeCategory;
                    return matchesSearch && matchesCat;
                });
            }, [players, searchQuery, activeCategory]);

            const groupedByTier = useMemo(() => {
                const groups = {};
                TIERS.forEach(t => groups[t.id] = []);
                filteredPlayers.forEach(p => {
                    if (groups[p.tier]) groups[p.tier].push(p);
                    else groups['D'].push(p);
                });
                Object.keys(groups).forEach(t => groups[t].sort((a,b) => (b.points || 0) - (a.points || 0)));
                return groups;
            }, [filteredPlayers]);

            if (loading) return <LoadingScreen />;

            return (
                <div className="min-h-screen flex text-white relative">
                    {/* Sidebar */}
                    <AnimatePresence>
                        {(sidebarOpen || window.innerWidth > 768) && (
                            <motion.aside 
                                initial={{ x: -300 }}
                                animate={{ x: 0 }}
                                className="fixed md:static inset-y-0 left-0 w-72 glass border-r border-brand/20 z-[60] flex flex-col"
                            >
                                <div className="p-8 flex items-center space-x-3">
                                    <div className="w-10 h-10 bg-brand rounded-xl flex items-center justify-center p-1.5 shadow-[0_0_20px_rgba(255,103,0,0.3)]">
                                        <img src={WEB_LOGO} className="w-full h-full rounded-lg" />
                                    </div>
                                    <h1 className="text-xl font-black tracking-tighter uppercase">Steal<span className="text-brand">Fun</span></h1>
                                </div>

                                <nav className="flex-1 px-4 py-2 space-y-1.5 overflow-y-auto custom-scrollbar">
                                    <p className="px-4 text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">Categories</p>
                                    {CATEGORIES.map(cat => (
                                        <button
                                            key={cat.id}
                                            onClick={() => { setActiveCategory(cat.id); setSidebarOpen(false); }}
                                            className={`w-full flex items-center justify-between px-4 py-3.5 rounded-2xl transition-all ${
                                                activeCategory === cat.id 
                                                ? 'bg-brand/10 text-brand border border-brand/20 shadow-lg' 
                                                : 'text-gray-400 hover:text-white border border-transparent hover:bg-white/5'
                                            }`}
                                        >
                                            <div className="flex items-center space-x-3">
                                                {cat.icon}
                                                <span className="font-bold text-sm tracking-tight">{cat.name}</span>
                                            </div>
                                            {activeCategory === cat.id && <ChevronRight className="w-4 h-4" />}
                                        </button>
                                    ))}
                                </nav>

                                <div className="p-6 border-t border-brand/10 bg-black/40">
                                    <button 
                                        onClick={() => setShowAdminModal(true)}
                                        className="w-full flex items-center justify-center space-x-2 py-3.5 rounded-2xl border border-white/5 bg-white/5 hover:bg-brand/10 hover:border-brand/20 text-gray-400 hover:text-brand transition-all font-black text-[11px] uppercase tracking-widest"
                                    >
                                        <Lock className="w-3 h-3" />
                                        <span>Dashboard</span>
                                    </button>
                                </div>
                            </motion.aside>
                        )}
                    </AnimatePresence>

                    {/* Content */}
                    <main className="flex-1 min-h-screen flex flex-col relative overflow-hidden">
                        <header className="sticky top-0 z-50 glass border-b border-brand/20 px-6 md:px-12 py-5 flex items-center justify-between gap-4">
                            <button onClick={() => setSidebarOpen(true)} className="md:hidden p-2 bg-white/5 rounded-xl border border-white/10">
                                <Menu className="w-5 h-5" />
                            </button>

                            <div className="relative flex-1 max-w-md">
                                <Search className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" />
                                <input 
                                    type="text" 
                                    placeholder="Search rankings..." 
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full bg-black/40 border border-white/10 rounded-2xl pl-12 pr-4 py-3 text-sm focus:border-brand outline-none transition-all focus:ring-1 focus:ring-brand/30"
                                />
                            </div>

                            <div className="hidden sm:flex items-center gap-4">
                                <div className="flex flex-col items-end">
                                    <span className="text-[10px] font-black text-brand uppercase tracking-widest opacity-60">Server IP</span>
                                    <span className="text-sm font-black tracking-tight">{SERVER_IP}</span>
                                </div>
                                <div className="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center p-2 cursor-pointer hover:bg-brand/10 hover:border-brand/30 transition-all" onClick={() => {
                                    navigator.clipboard.writeText(SERVER_IP);
                                }}>
                                    <Copy className="w-4 h-4 text-brand" />
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 p-6 md:p-12 overflow-y-auto custom-scrollbar">
                            <div className="max-w-7xl mx-auto space-y-16">
                                {TIERS.map(tier => {
                                    const tierPlayers = groupedByTier[tier.id];
                                    if (tierPlayers.length === 0) return null;
                                    return (
                                        <section key={tier.id} className="space-y-6">
                                            <div className="flex items-center space-x-4">
                                                <div className={`px-5 py-2 rounded-xl font-black text-[10px] uppercase tracking-[0.3em] ${tier.bg} ${tier.color} border border-brand/20`}>
                                                    {tier.name}
                                                </div>
                                                <div className="h-[1px] flex-1 bg-gradient-to-r from-brand/20 to-transparent"></div>
                                            </div>

                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                                <AnimatePresence mode="popLayout">
                                                    {tierPlayers.map((player, idx) => (
                                                        <PlayerCard key={player.id} player={player} index={idx} tier={tier} isOverall={activeCategory === 'overall'} />
                                                    ))}
                                                </AnimatePresence>
                                            </div>
                                        </section>
                                    );
                                })}
                            </div>
                        </div>

                        <footer className="p-10 text-center opacity-30 text-[10px] font-black uppercase tracking-[0.4em]">
                            Built by OpSiond &bull; StealFun Network &bull; 2024
                        </footer>
                    </main>

                    <AnimatePresence>
                        {showAdminModal && (
                            <AdminPanel 
                                onClose={() => setShowAdminModal(false)} 
                                isAdmin={isAdmin} 
                                setIsAdmin={setIsAdmin} 
                                players={players} 
                                db={db} 
                                appId={appId} 
                            />
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        function PlayerCard({ player, index, tier, isOverall }) {
            const isTop3 = index < 3 && isOverall;
            const isBedrock = player.name?.startsWith('.');
            
            return (
                <motion.div 
                    layout
                    initial={{ opacity: 0, y: 10 }}
                    animate={{ opacity: 1, y: 0 }}
                    exit={{ opacity: 0, scale: 0.95 }}
                    whileHover={{ y: -5 }}
                    className="player-card group relative glass bg-panel p-6 rounded-[2.5rem] border-2 border-brand/5 hover:border-brand/20 transition-all overflow-hidden"
                >
                    <div className="flex items-center space-x-5 relative z-10">
                        <div className="relative">
                            <img 
                                src={`https://mc-heads.net/avatar/${player.name}/64`} 
                                className="w-14 h-14 rounded-2xl bg-black/50 border border-brand/20 p-1.5"
                                onError={(e) => { e.target.src = 'https://mc-heads.net/avatar/Steve/64'; }}
                            />
                            {isTop3 && (
                                <div className={`absolute -top-3 -left-3 w-8 h-8 rounded-full flex items-center justify-center font-black text-xs shadow-xl border-2 border-panel bg-black`}>
                                    <span className={index === 0 ? 'shine-gold' : index === 1 ? 'shine-silver' : 'shine-bronze'}>#{index+1}</span>
                                </div>
                            )}
                        </div>
                        <div className="min-w-0">
                            <h3 className="font-black text-lg tracking-tighter truncate group-hover:text-brand transition-colors uppercase">
                                {player.name}
                            </h3>
                            <div className="flex items-center gap-2 mt-1">
                                <span className={`text-[8px] font-black px-1.5 py-0.5 rounded border ${isBedrock ? 'border-blue-500/30 text-blue-400 bg-blue-500/10' : 'border-brand/30 text-brand bg-brand/10'} uppercase tracking-widest`}>
                                    {isBedrock ? 'Bedrock' : 'Java'}
                                </span>
                                <span className="text-[9px] font-bold text-gray-500 uppercase">{player.region || 'Global'}</span>
                            </div>
                        </div>
                    </div>

                    <div className="mt-6 flex items-end justify-between border-t border-brand/10 pt-4">
                        <div className="flex flex-col">
                            <span className="text-[8px] font-black text-gray-600 uppercase tracking-widest">Points</span>
                            <span className="text-xl font-black tabular-nums tracking-tighter text-brand">{player.points}</span>
                        </div>
                        <div className={`px-4 py-1.5 rounded-xl bg-white/5 border border-white/5 ${tier.color} text-[10px] font-black uppercase tracking-widest`}>
                            {tier.id}
                        </div>
                    </div>

                    {/* Aesthetic Background Sparkle */}
                    <div className="absolute top-0 right-0 w-32 h-32 bg-brand/5 rounded-full blur-[40px] -mr-16 -mt-16 group-hover:bg-brand/10 transition-all"></div>
                </motion.div>
            );
        }

        function LoadingScreen() {
            return (
                <div className="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center">
                    <div className="relative w-32 h-32 mb-8">
                        {/* Logo with pulse */}
                        <motion.div 
                            animate={{ scale: [1, 1.1, 1], opacity: [0.7, 1, 0.7] }}
                            transition={{ repeat: Infinity, duration: 2, ease: "easeInOut" }}
                            className="absolute inset-0 z-20"
                        >
                            <img src={WEB_LOGO} className="w-full h-full rounded-full shadow-[0_0_50px_rgba(255,103,0,0.5)] border-4 border-brand/20" />
                        </motion.div>

                        {/* Shattering particles */}
                        {[...Array(8)].map((_, i) => (
                            <motion.div
                                key={i}
                                initial={{ opacity: 0, x: 0, y: 0 }}
                                animate={{ 
                                    opacity: [0, 1, 0], 
                                    x: (Math.random() - 0.5) * 200, 
                                    y: (Math.random() - 0.5) * 200,
                                    rotate: Math.random() * 360
                                }}
                                transition={{ repeat: Infinity, duration: 2, delay: i * 0.1, ease: "easeOut" }}
                                className="absolute top-1/2 left-1/2 w-3 h-3 bg-brand/40 rounded-sm blur-sm z-10"
                            />
                        ))}
                    </div>
                    
                    <motion.h2 
                        initial={{ opacity: 0 }} 
                        animate={{ opacity: 1 }}
                        className="text-xl font-black tracking-[0.5em] uppercase text-brand"
                    >
                        Synchronizing
                    </motion.h2>
                    <div className="mt-4 flex gap-1">
                        {[0,1,2].map(i => (
                            <motion.div 
                                key={i}
                                animate={{ y: [0, -5, 0] }}
                                transition={{ repeat: Infinity, duration: 0.6, delay: i * 0.2 }}
                                className="w-1 h-1 bg-brand rounded-full"
                            />
                        ))}
                    </div>
                </div>
            );
        }

        function AdminPanel({ onClose, isAdmin, setIsAdmin, players, db, appId }) {
            const [pass, setPass] = useState('');
            const [storedPass, setStoredPass] = useState(DEFAULT_PASS);
            const [error, setError] = useState(false);
            const [formData, setFormData] = useState({ name: '', tier: 'B', points: 0, category: 'overall', region: 'Global' });

            useEffect(() => {
                const fetchAdmin = async () => {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
                    const snap = await getDoc(docRef);
                    if (snap.exists()) setStoredPass(snap.data().password);
                };
                fetchAdmin();
            }, [db, appId]);

            const login = (e) => {
                e.preventDefault();
                if (pass === storedPass) setIsAdmin(true);
                else { setError(true); setTimeout(() => setError(false), 2000); }
            };

            const addPlayer = async (e) => {
                e.preventDefault();
                if (!formData.name) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'players'), {
                        ...formData,
                        points: Number(formData.points),
                        created: new Date().toISOString()
                    });
                    setFormData({ ...formData, name: '', points: 0 });
                } catch (err) { console.error(err); }
            };

            const deletePlayer = async (id) => {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id));
                } catch (err) { console.error(err); }
            };

            return (
                <motion.div 
                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                    className="fixed inset-0 z-[100] bg-black/90 backdrop-blur-2xl flex items-center justify-center p-4"
                >
                    <motion.div 
                        initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }}
                        className="glass w-full max-w-2xl rounded-[3rem] overflow-hidden shadow-2xl flex flex-col max-h-[90vh]"
                    >
                        <header className="p-8 border-b border-brand/20 flex justify-between items-center bg-brand/5">
                            <div className="flex items-center gap-3">
                                <Shield className="w-6 h-6 text-brand" />
                                <h2 className="text-xl font-black uppercase tracking-widest">Management</h2>
                            </div>
                            <button onClick={onClose} className="p-2 bg-white/5 rounded-xl hover:bg-white/10 transition-all"><X /></button>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                            {!isAdmin ? (
                                <form onSubmit={login} className="max-w-xs mx-auto py-20 space-y-6">
                                    <div className="text-center space-y-2">
                                        <Lock className="w-12 h-12 text-brand/20 mx-auto" />
                                        <p className="text-xs font-bold text-gray-500 uppercase tracking-widest">Verification Key</p>
                                    </div>
                                    <input 
                                        type="password" 
                                        autoFocus
                                        value={pass} 
                                        onChange={e => setPass(e.target.value)}
                                        className={`w-full bg-black/60 border ${error ? 'border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.2)]' : 'border-brand/20'} rounded-3xl p-5 text-center text-xl focus:outline-none transition-all font-black tracking-widest`} 
                                    />
                                    <button className="w-full bg-brand py-4 rounded-3xl font-black uppercase tracking-widest shadow-xl shadow-brand/20 active:scale-95 transition-all">Unlock</button>
                                </form>
                            ) : (
                                <div className="space-y-10">
                                    <form onSubmit={addPlayer} className="bg-white/5 p-6 rounded-[2rem] border border-white/5 space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="col-span-2 space-y-1.5">
                                                <label className="text-[10px] font-black text-gray-500 uppercase ml-2">Minecraft Name</label>
                                                <input value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-black/60 border border-brand/20 rounded-2xl p-4 outline-none focus:border-brand" placeholder="e.g. OpSiond" />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-gray-500 uppercase ml-2">Tier</label>
                                                <select value={formData.tier} onChange={e => setFormData({...formData, tier: e.target.value})} className="w-full bg-black/60 border border-brand/20 rounded-2xl p-4 outline-none focus:border-brand text-gray-400">
                                                    {TIERS.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-gray-500 uppercase ml-2">Points</label>
                                                <input type="number" value={formData.points} onChange={e => setFormData({...formData, points: e.target.value})} className="w-full bg-black/60 border border-brand/20 rounded-2xl p-4 outline-none focus:border-brand" />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-gray-500 uppercase ml-2">Category</label>
                                                <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full bg-black/60 border border-brand/20 rounded-2xl p-4 outline-none focus:border-brand text-gray-400">
                                                    {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-gray-500 uppercase ml-2">Region</label>
                                                <input value={formData.region} onChange={e => setFormData({...formData, region: e.target.value})} className="w-full bg-black/60 border border-brand/20 rounded-2xl p-4 outline-none focus:border-brand" placeholder="Global" />
                                            </div>
                                        </div>
                                        <button className="w-full bg-brand py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-brand/20">Add Player</button>
                                    </form>

                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2">Registered Fighters ({players.length})</p>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-64 overflow-y-auto custom-scrollbar pr-2">
                                            {players.map(p => (
                                                <div key={p.id} className="flex items-center justify-between p-4 bg-black/40 rounded-2xl border border-white/5 hover:border-brand/30 transition-all group">
                                                    <div className="flex items-center gap-3">
                                                        <img src={`https://mc-heads.net/avatar/${p.name}/32`} className="w-8 h-8 rounded-lg" />
                                                        <div>
                                                            <p className="font-bold text-xs uppercase">{p.name}</p>
                                                            <p className="text-[8px] font-black text-brand uppercase">{p.tier} • {p.points}pts</p>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => deletePlayer(p.id)} className="p-2 text-gray-600 hover:text-red-500 transition-colors"><Trash2 className="w-4 h-4" /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </motion.div>
                </motion.div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
