<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StealFun Tiers | Created by OpSiond</title>
    <link rel="icon" href="https://dbl-discord.usercontent.prism.gg/icons/1207931735485186130/2c52815797cec81dd5c63e3311dac184.png?size=256">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#050505',
                        panel: 'rgba(10, 10, 10, 0.85)',
                        brand: '#FF6700', 
                        border: 'rgba(255, 103, 0, 0.2)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Import Maps -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.3.1",
                "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
                "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
                "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react,react-dom",
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            }
        }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 103, 0, 0.15), transparent 50%), 
                              linear-gradient(to bottom, rgba(5, 5, 5, 0.85), rgba(5, 5, 5, 0.98)), 
                              url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSx6zuKmK6wlvDq1C-n_hCqmor0QQEosek3xg&s');
            background-size: 100% 100%, cover, cover;
            background-attachment: fixed;
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #FF6700; border-radius: 10px; }

        @keyframes shine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .shine-gold { background: linear-gradient(90deg, #ffd700 0%, #fff3a0 25%, #ffd700 50%, #fff3a0 75%, #ffd700 100%); background-size: 200% auto; animation: shine 4s linear infinite; }
        .shine-silver { background: linear-gradient(90deg, #c0c0c0 0%, #ffffff 25%, #c0c0c0 50%, #ffffff 75%, #c0c0c0 100%); background-size: 200% auto; animation: shine 4s linear infinite; }
        .shine-bronze { background: linear-gradient(90deg, #cd7f32 0%, #ffbb77 25%, #cd7f32 50%, #ffbb77 75%, #cd7f32 100%); background-size: 200% auto; animation: shine 4s linear infinite; }

        .glass { background: rgba(10, 10, 10, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 103, 0, 0.15); }
        
        .tier-card {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }
        
        .tier-card:hover {
            box-shadow: 0 20px 40px -10px rgba(255, 103, 0, 0.2);
        }

        .copy-success::after {
            content: 'COPIED!';
            position: absolute;
            top: -25px;
            right: 0;
            font-size: 10px;
            color: #FF6700;
            font-weight: 900;
            animation: fadeUp 0.8s forwards;
            letter-spacing: 0.1em;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(-5px); }
        }

        .loading-pulse {
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; filter: drop-shadow(0 0 10px rgba(255,103,0,0.3)); }
            50% { opacity: 1; filter: drop-shadow(0 0 30px rgba(255,103,0,0.8)); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence, useScroll, useSpring } from 'framer-motion';
        import { 
            Search, Shield, Lock, X, Plus, Trash2, Loader2, Trophy, 
            Swords, Globe, Flame, Zap, Target, Crosshair, Crown, Copy, ExternalLink, Key, CheckCircle2, ChevronRight
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, addDoc, getDoc } from 'firebase/firestore';

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'stealfun-tiers-prod';

        const DEFAULT_PASS = "OpSiond0000";
        const DISCORD_LINK = "https://discord.gg/stealfun";
        const SERVER_IP = "play.stealfun.in";
        const WEB_LOGO = "https://dbl-discord.usercontent.prism.gg/icons/1207931735485186130/2c52815797cec81dd5c63e3311dac184.png?size=256";

        const CATEGORIES = [
            { id: 'overall', name: 'Overall', icon: <Trophy className="w-4 h-4" /> },
            { id: 'sword', name: 'Sword', icon: <Swords className="w-4 h-4" /> },
            { id: 'mace', name: 'Mace', icon: <Zap className="w-4 h-4" /> },
            { id: 'nethpot', name: 'NethPot', icon: <Flame className="w-4 h-4" /> },
            { id: 'crystal', name: 'Crystal', icon: <Target className="w-4 h-4" /> },
            { id: 'uhc', name: 'UHC', icon: <Globe className="w-4 h-4" /> },
            { id: 'smpkit', name: 'SMP Kit', icon: <Crosshair className="w-4 h-4" /> },
            { id: 'spear', name: 'Spear', icon: <Shield className="w-4 h-4" /> }
        ];

        const TIERS = [
            { id: 'S+', name: 'S+ Tier', color: 'text-red-500', bg: 'bg-red-500/10', border: 'border-red-500/20' },
            { id: 'S', name: 'S Tier', color: 'text-orange-500', bg: 'bg-orange-500/10', border: 'border-orange-500/20' },
            { id: 'A', name: 'A Tier', color: 'text-purple-500', bg: 'bg-purple-500/10', border: 'border-purple-500/20' },
            { id: 'B', name: 'B Tier', color: 'text-blue-500', bg: 'bg-blue-500/10', border: 'border-blue-500/20' },
            { id: 'C', name: 'C Tier', color: 'text-green-500', bg: 'bg-green-500/10', border: 'border-green-500/20' },
            { id: 'D', name: 'D Tier', color: 'text-gray-400', bg: 'bg-gray-400/10', border: 'border-gray-400/20' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [players, setPlayers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeCategory, setActiveCategory] = useState('overall');
            const [searchQuery, setSearchQuery] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [copied, setCopied] = useState(false);

            const { scrollYProgress } = useScroll();
            const scaleX = useSpring(scrollYProgress, { stiffness: 100, damping: 30 });

            // (Rule 3) Firebase Auth Init
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth failed:", err);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // (Rule 1 & 2) Firestore Fetching
            useEffect(() => {
                if (!user) return;
                const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'mc_players');
                
                const unsubscribe = onSnapshot(playersRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setPlayers(data);
                    // Artificial delay for cool animation demo
                    setTimeout(() => setLoading(false), 800);
                }, (err) => {
                    console.error("Firestore loading error:", err);
                    setLoading(false);
                });
                
                return () => unsubscribe();
            }, [user]);

            const filteredPlayers = useMemo(() => {
                return players.filter(p => {
                    const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = activeCategory === 'overall' || p.category === activeCategory;
                    return matchesSearch && matchesCategory;
                });
            }, [players, searchQuery, activeCategory]);

            const groupedPlayers = useMemo(() => {
                const grouped = {};
                TIERS.forEach(t => grouped[t.id] = []);
                filteredPlayers.forEach(p => {
                    if (grouped[p.tier]) grouped[p.tier].push(p);
                    else grouped['D'].push(p);
                });
                Object.keys(grouped).forEach(tier => {
                    grouped[tier].sort((a, b) => (b.points || 0) - (a.points || 0));
                });
                return grouped;
            }, [filteredPlayers]);

            const copyIp = () => {
                const el = document.createElement('textarea');
                el.value = SERVER_IP;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            if (loading) return <CoolLoader logo={WEB_LOGO} />;

            return (
                <div className="flex min-h-screen relative z-10 selection:bg-brand/40">
                    <motion.div className="fixed top-0 left-0 right-0 h-1 bg-brand origin-left z-[100]" style={{ scaleX }} />

                    {/* Sidebar */}
                    <aside className="hidden lg:flex flex-col w-72 fixed inset-y-0 left-0 glass border-r border-brand/20 z-40">
                        <div className="p-8">
                            <motion.div 
                                initial={{ opacity: 0, x: -20 }}
                                animate={{ opacity: 1, x: 0 }}
                                className="flex items-center space-x-4 mb-3"
                            >
                                <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-brand to-orange-700 flex items-center justify-center shadow-lg border border-white/20">
                                    <img src={WEB_LOGO} className="w-8 h-8 rounded-full" />
                                </div>
                                <div className="flex flex-col">
                                    <span className="font-black text-2xl tracking-tighter leading-none">STEAL<span className="text-brand">FUN</span></span>
                                    <span className="text-[10px] text-brand/70 font-bold uppercase tracking-[0.2em] mt-1">Tier System</span>
                                </div>
                            </motion.div>
                        </div>
                        
                        <nav className="flex-1 px-4 space-y-2 mt-4 overflow-y-auto custom-scrollbar">
                            <div className="px-4 py-3 text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]">Categories</div>
                            {CATEGORIES.map((cat, idx) => (
                                <motion.button
                                    key={cat.id}
                                    initial={{ opacity: 0, x: -10 }}
                                    animate={{ opacity: 1, x: 0 }}
                                    transition={{ delay: idx * 0.05 }}
                                    whileHover={{ x: 5, backgroundColor: 'rgba(255, 103, 0, 0.05)' }}
                                    whileTap={{ scale: 0.98 }}
                                    onClick={() => setActiveCategory(cat.id)}
                                    className={`w-full flex items-center justify-between px-5 py-4 rounded-2xl transition-all duration-200 ${
                                        activeCategory === cat.id 
                                        ? 'bg-brand/10 text-brand border border-brand/40 shadow-lg' 
                                        : 'text-gray-400 border border-transparent hover:text-white'
                                    }`}
                                >
                                    <div className="flex items-center space-x-3">
                                        {cat.icon}
                                        <span className="font-bold text-sm">{cat.name}</span>
                                    </div>
                                    {activeCategory === cat.id && <motion.div layoutId="activeCat" className="w-1.5 h-1.5 rounded-full bg-brand shadow-[0_0_10px_#FF6700]" />}
                                </motion.button>
                            ))}
                        </nav>

                        <div className="p-6 border-t border-brand/10">
                            <button onClick={() => setShowAdminModal(true)} className="w-full flex items-center justify-center space-x-2 px-4 py-4 rounded-2xl border border-brand/10 bg-black/40 text-gray-500 hover:text-brand hover:border-brand/50 transition-all group">
                                {isAdmin ? <Shield className="w-4 h-4 text-brand" /> : <Lock className="w-4 h-4 group-hover:rotate-12 transition-transform" />}
                                <span className="font-black text-[10px] uppercase tracking-widest">{isAdmin ? 'ADMIN PANEL' : 'ACCESS'}</span>
                            </button>
                            <p className="text-[10px] text-center text-gray-600 mt-4 font-bold uppercase">OpSiond Creation</p>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 lg:ml-72 relative min-h-screen flex flex-col">
                        <header className="sticky top-0 z-50 glass border-b border-brand/20 px-6 py-4 md:px-10 flex flex-col xl:flex-row items-center justify-between gap-6">
                            <div className="relative w-full md:w-96">
                                <Search className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-brand/50" />
                                <input 
                                    type="text" placeholder="Search for legendary players..." value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full bg-black/60 border border-brand/20 rounded-2xl pl-12 pr-4 py-4 text-sm focus:border-brand outline-none shadow-inner"
                                />
                            </div>

                            <div className="flex items-center space-x-4 w-full xl:w-auto justify-end">
                                <a href={DISCORD_LINK} target="_blank" className="flex items-center space-x-3 bg-[#5865F2] hover:bg-[#4752c4] px-6 py-3.5 rounded-2xl transition-all shadow-lg hover:scale-105 active:scale-95 border border-white/10 group">
                                    <svg className="w-5 h-5 fill-white group-hover:animate-bounce" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.947 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.946 2.419-2.157 2.419z"/></svg>
                                    <span className="font-black text-[10px] tracking-widest text-white uppercase hidden sm:block">Community</span>
                                </a>

                                <div onClick={copyIp} className={`relative flex items-center space-x-3 bg-white/5 hover:bg-white/10 px-6 py-3.5 rounded-2xl border border-brand/20 cursor-pointer group transition-all ${copied ? 'copy-success' : ''}`}>
                                    <div className="flex flex-col items-end">
                                        <span className="text-[9px] font-black text-brand uppercase tracking-widest opacity-60 group-hover:opacity-100">Play Now</span>
                                        <span className="text-sm font-extrabold text-white">{SERVER_IP}</span>
                                    </div>
                                    <Copy className="w-4 h-4 text-brand group-hover:scale-110" />
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 p-6 md:p-12 overflow-y-auto custom-scrollbar">
                            <div className="max-w-7xl mx-auto space-y-20 pb-20">
                                {TIERS.map(tier => {
                                    const tierPlayers = groupedPlayers[tier.id];
                                    if (!tierPlayers || tierPlayers.length === 0) return null;
                                    return (
                                        <div key={tier.id} className="space-y-8">
                                            <div className="flex items-center space-x-6">
                                                <div className={`px-6 py-3 rounded-2xl font-black text-[11px] uppercase tracking-[0.4em] ${tier.bg} ${tier.color} border border-brand/30 shadow-2xl backdrop-blur-md`}>
                                                    {tier.name}
                                                </div>
                                                <div className="h-[1px] flex-1 bg-gradient-to-r from-brand/40 to-transparent"></div>
                                                <span className="text-[10px] font-bold text-gray-600 uppercase tracking-widest">{tierPlayers.length} Players</span>
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                                <AnimatePresence mode="popLayout">
                                                    {tierPlayers.map((player, index) => (
                                                        <PlayerCard key={player.id} player={player} index={index} tier={tier} isOverall={activeCategory === 'overall'} />
                                                    ))}
                                                </AnimatePresence>
                                            </div>
                                        </div>
                                    )
                                })}

                                {filteredPlayers.length === 0 && (
                                    <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex flex-col items-center justify-center py-40 text-center">
                                        <div className="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-6 border border-white/10">
                                            <Search className="w-8 h-8 text-gray-600" />
                                        </div>
                                        <h3 className="text-2xl font-black text-gray-400">No legendary fighters found</h3>
                                        <p className="text-gray-600 mt-2">Try adjusting your filters or search query.</p>
                                    </motion.div>
                                )}
                            </div>
                        </div>

                        <footer className="p-12 text-center border-t border-brand/10 glass">
                            <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
                                <p className="text-xs text-gray-500 font-medium tracking-widest uppercase">© 2024 StealFun Network. Created with ❤️ by <span className="text-brand font-black">OpSiond</span></p>
                                <div className="flex space-x-6 text-[10px] font-black text-gray-600 uppercase tracking-[0.3em]">
                                    <a href="#" className="hover:text-brand transition-colors">Rules</a>
                                    <a href="#" className="hover:text-brand transition-colors">Store</a>
                                    <a href="#" className="hover:text-brand transition-colors">Support</a>
                                </div>
                            </div>
                        </footer>
                    </main>

                    <AnimatePresence>
                        {showAdminModal && (
                            <AdminPanel onClose={() => setShowAdminModal(false)} isAdmin={isAdmin} setIsAdmin={setIsAdmin} players={players} db={db} appId={appId} />
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        function CoolLoader({ logo }) {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-black overflow-hidden relative">
                    <div className="absolute inset-0 bg-gradient-to-b from-brand/5 to-transparent pointer-events-none" />
                    
                    <motion.div 
                        initial={{ scale: 0.8, opacity: 0 }}
                        animate={{ scale: 1, opacity: 1 }}
                        transition={{ duration: 1, ease: "easeOut" }}
                        className="relative z-10"
                    >
                        <div className="relative">
                            <motion.div 
                                animate={{ rotate: 360 }}
                                transition={{ repeat: Infinity, duration: 8, ease: "linear" }}
                                className="absolute -inset-8 border-2 border-brand/20 border-dashed rounded-full"
                            />
                            <motion.div 
                                animate={{ rotate: -360 }}
                                transition={{ repeat: Infinity, duration: 12, ease: "linear" }}
                                className="absolute -inset-16 border border-brand/10 border-dashed rounded-full"
                            />
                            <img src={logo} className="w-32 h-32 rounded-full relative z-20 loading-pulse shadow-[0_0_60px_rgba(255,103,0,0.4)] border-4 border-black" />
                        </div>
                    </motion.div>

                    <motion.div 
                        initial={{ y: 20, opacity: 0 }}
                        animate={{ y: 0, opacity: 1 }}
                        transition={{ delay: 0.5, duration: 0.8 }}
                        className="mt-12 text-center"
                    >
                        <h2 className="text-2xl font-black text-white tracking-[0.4em] uppercase mb-2">Syncing Data</h2>
                        <div className="flex items-center justify-center space-x-1">
                            {[0, 1, 2].map(i => (
                                <motion.div 
                                    key={i}
                                    animate={{ scale: [1, 1.5, 1], opacity: [0.3, 1, 0.3] }}
                                    transition={{ repeat: Infinity, duration: 1.5, delay: i * 0.2 }}
                                    className="w-1.5 h-1.5 bg-brand rounded-full"
                                />
                            ))}
                        </div>
                    </motion.div>
                </div>
            );
        }

        function PlayerCard({ player, index, tier, isOverall }) {
            const isBedrock = player.name.startsWith('.');
            const platformTag = isBedrock ? 'Bedrock' : 'Java';
            const isTop3 = index < 3 && isOverall;
            const medalClass = index === 0 ? 'shine-gold' : index === 1 ? 'shine-silver' : index === 2 ? 'shine-bronze' : '';

            return (
                <motion.div 
                    layout 
                    initial={{ opacity: 0, y: 20 }} 
                    animate={{ opacity: 1, y: 0 }} 
                    exit={{ opacity: 0, scale: 0.8 }}
                    className={`tier-card group relative bg-panel border-2 ${isTop3 ? 'border-brand/40 shadow-[0_0_20px_rgba(255,103,0,0.1)]' : 'border-brand/5'} rounded-[2.5rem] p-8 overflow-hidden`}
                >
                    {isTop3 && <div className={`absolute inset-x-0 top-0 h-1 ${medalClass}`} />}
                    
                    <div className="relative flex items-center space-x-6">
                        <div className="relative flex-shrink-0">
                            <motion.img 
                                whileHover={{ scale: 1.1, rotate: 5 }}
                                src={`https://mc-heads.net/avatar/${player.name}/128`} 
                                className="w-20 h-20 rounded-3xl bg-black border-2 border-brand/20 p-2 shadow-2xl relative z-10" 
                                onError={(e) => { e.target.src = 'https://mc-heads.net/avatar/Steve/128'; }} 
                            />
                            <div className={`absolute -top-3 -left-3 w-10 h-10 rounded-2xl ${isTop3 ? medalClass : 'bg-brand'} flex items-center justify-center text-xs font-black text-white shadow-2xl border-2 border-black z-20`}>
                                #{index + 1}
                            </div>
                        </div>
                        <div className="flex-1 min-w-0">
                            <h3 className="font-black text-white text-2xl tracking-tighter truncate group-hover:text-brand transition-colors">
                                {player.name}
                            </h3>
                            <div className="flex items-center gap-2 mt-2">
                                <span className={`px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest ${isBedrock ? 'bg-blue-500/10 text-blue-400 border border-blue-500/20' : 'bg-brand/10 text-brand border border-brand/20'}`}>
                                    {platformTag}
                                </span>
                                <span className="text-[10px] font-bold text-gray-500 bg-white/5 px-2 py-1 rounded-lg border border-white/5 uppercase tracking-tighter">
                                    {player.region || 'GL'}
                                </span>
                            </div>
                        </div>
                    </div>

                    <div className="mt-8 flex items-end justify-between border-t border-white/5 pt-6">
                        <div className="flex flex-col">
                            <span className="text-[9px] uppercase tracking-[0.2em] text-gray-500 font-black mb-1">Combat Rating</span>
                            <div className="flex items-center space-x-2">
                                <span className="text-3xl font-black text-brand leading-none tabular-nums tracking-tighter">{player.points}</span>
                                <Zap className="w-3 h-3 text-brand opacity-50" />
                            </div>
                        </div>
                        <div className={`px-5 py-2 rounded-2xl bg-white/5 border border-white/10 ${tier.color} text-xs font-black uppercase tracking-widest shadow-inner`}>
                            {tier.id}
                        </div>
                    </div>
                </motion.div>
            );
        }

        function AdminPanel({ onClose, isAdmin, setIsAdmin, players, db, appId }) {
            const [pass, setPass] = useState('');
            const [storedPass, setStoredPass] = useState(DEFAULT_PASS);
            const [error, setError] = useState(false);
            const [newName, setNewName] = useState('');
            const [newCategory, setNewCategory] = useState('overall');
            const [newRegion, setNewRegion] = useState('Global');
            const [newTier, setNewTier] = useState('B');
            const [newPoints, setNewPoints] = useState(0);
            const [newAdminPass, setNewAdminPass] = useState('');
            const [passStatus, setPassStatus] = useState('');

            useEffect(() => {
                if (!db) return;
                const fetchPass = async () => {
                    // (Rule 1) Document Path: /artifacts/{appId}/public/data/settings/admin (6 segments)
                    try {
                        const adminDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'admin');
                        const snap = await getDoc(adminDocRef);
                        if (snap.exists()) setStoredPass(snap.data().password);
                    } catch (e) {
                        console.error("Auth config loading error:", e);
                    }
                };
                fetchPass();
            }, [db, appId]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (pass === storedPass) setIsAdmin(true);
                else { setError(true); setTimeout(() => setError(false), 2000); }
            };

            const handleAddPlayer = async (e) => {
                e.preventDefault();
                if (!newName.trim()) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'mc_players'), {
                        name: newName.trim(),
                        category: newCategory,
                        region: newRegion,
                        tier: newTier,
                        points: Number(newPoints),
                        addedAt: new Date().toISOString()
                    });
                    setNewName('');
                    setNewPoints(0);
                } catch (e) { console.error(e); }
            };

            const handleChangePassword = async (e) => {
                e.preventDefault();
                if (!newAdminPass.trim()) return;
                try {
                    const adminDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'admin');
                    await setDoc(adminDocRef, { password: newAdminPass.trim() });
                    setStoredPass(newAdminPass.trim());
                    setPassStatus('Updated!');
                    setNewAdminPass('');
                    setTimeout(() => setPassStatus(''), 3000);
                } catch (e) { console.error(e); }
            }

            return (
                <motion.div 
                    initial={{ opacity: 0 }} 
                    animate={{ opacity: 1 }} 
                    exit={{ opacity: 0 }} 
                    className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-2xl"
                >
                    <motion.div 
                        initial={{ scale: 0.9, y: 20 }} 
                        animate={{ scale: 1, y: 0 }} 
                        className="bg-panel border border-brand/40 rounded-[3rem] w-full max-w-4xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]"
                    >
                        <div className="p-8 border-b border-brand/20 flex justify-between items-center bg-brand/5">
                            <div className="flex items-center space-x-4 text-brand">
                                <Shield className="w-10 h-10" />
                                <div>
                                    <h2 className="text-2xl font-black uppercase tracking-widest leading-none">Command Center</h2>
                                    <p className="text-[10px] text-gray-500 font-bold mt-1 tracking-[0.2em]">Authorized Personnel Only</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-4 hover:bg-white/10 rounded-3xl transition-colors"><X /></button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-10 custom-scrollbar">
                            {!isAdmin ? (
                                <form onSubmit={handleLogin} className="max-w-md mx-auto space-y-8 py-20">
                                    <div className="text-center space-y-2">
                                        <Lock className="w-12 h-12 text-brand/30 mx-auto mb-4" />
                                        <h3 className="text-xl font-bold">Authentication Key</h3>
                                        <p className="text-sm text-gray-500">Enter your access code to manage rankings.</p>
                                    </div>
                                    <input 
                                        type="password" placeholder="••••••••" value={pass} 
                                        onChange={e => setPass(e.target.value)} 
                                        className={`w-full bg-black/60 border ${error ? 'border-red-500 shadow-[0_0_20px_rgba(239,68,68,0.2)]' : 'border-brand/20'} rounded-3xl p-6 text-center text-2xl focus:outline-none transition-all font-black tracking-[0.6em]`} 
                                    />
                                    <button className="w-full bg-brand text-white font-black py-6 rounded-3xl shadow-2xl shadow-brand/40 uppercase tracking-widest hover:scale-[1.02] active:scale-[0.98] transition-transform">Unlock Dashboard</button>
                                </form>
                            ) : (
                                <div className="space-y-12">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                        <div className="space-y-6">
                                            <h3 className="text-sm font-black text-brand uppercase tracking-widest flex items-center gap-2">
                                                <Plus className="w-4 h-4" /> Add Player
                                            </h3>
                                            <form onSubmit={handleAddPlayer} className="space-y-4">
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-black text-gray-500 uppercase ml-2">Minecraft IGN</label>
                                                    <input type="text" placeholder="Notch" value={newName} onChange={e => setNewName(e.target.value)} className="w-full bg-black border border-brand/20 rounded-2xl p-4 text-sm focus:border-brand outline-none" />
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="space-y-2">
                                                        <label className="text-[10px] font-black text-gray-500 uppercase ml-2">Category</label>
                                                        <select value={newCategory} onChange={e => setNewCategory(e.target.value)} className="w-full bg-black border border-brand/20 rounded-2xl p-4 text-sm text-gray-400 outline-none">
                                                            {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                                        </select>
                                                    </div>
                                                    <div className="space-y-2">
                                                        <label className="text-[10px] font-black text-gray-500 uppercase ml-2">Tier</label>
                                                        <select value={newTier} onChange={e => setNewTier(e.target.value)} className="w-full bg-black border border-brand/20 rounded-2xl p-4 text-sm text-gray-400 outline-none">
                                                            {TIERS.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-black text-gray-500 uppercase ml-2">Points</label>
                                                    <input type="number" value={newPoints} onChange={e => setNewPoints(e.target.value)} className="w-full bg-black border border-brand/20 rounded-2xl p-4 text-sm outline-none" />
                                                </div>
                                                <button className="w-full bg-brand font-black py-4 rounded-2xl shadow-xl shadow-brand/20 text-sm uppercase tracking-widest">Register Player</button>
                                            </form>
                                        </div>

                                        <div className="space-y-6">
                                            <h3 className="text-sm font-black text-brand uppercase tracking-widest flex items-center gap-2">
                                                <Trash2 className="w-4 h-4" /> Active Roster
                                            </h3>
                                            <div className="space-y-3 max-h-[400px] overflow-y-auto custom-scrollbar pr-4">
                                                {players.map(p => (
                                                    <div key={p.id} className="flex items-center justify-between p-4 bg-black/40 rounded-2xl border border-white/5 group hover:border-brand/30 transition-all">
                                                        <div className="flex items-center space-x-3">
                                                            <img src={`https://mc-heads.net/avatar/${p.name}/32`} className="w-8 h-8 rounded-lg" />
                                                            <div>
                                                                <p className="font-bold text-sm leading-none">{p.name}</p>
                                                                <p className="text-[10px] text-gray-500 mt-1 uppercase font-black">{p.tier} • {p.points}pts</p>
                                                            </div>
                                                        </div>
                                                        <button 
                                                            onClick={async () => await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'mc_players', p.id))} 
                                                            className="text-gray-600 hover:text-red-500 p-2 rounded-xl hover:bg-red-500/10 transition-all"
                                                        >
                                                            <Trash2 className="w-4 h-4" />
                                                        </button>
                                                    </div>
                                                ))}
                                                {players.length === 0 && <p className="text-center py-10 text-gray-600 text-sm italic">No players registered yet.</p>}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-10 border-t border-white/5">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]">Credentials Management</h3>
                                            <AnimatePresence>
                                                {passStatus && (
                                                    <motion.span initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0 }} className="text-[10px] text-green-500 flex items-center gap-1 font-bold">
                                                        <CheckCircle2 className="w-3 h-3" /> {passStatus}
                                                    </motion.span>
                                                )}
                                            </AnimatePresence>
                                        </div>
                                        <form onSubmit={handleChangePassword} className="flex gap-4">
                                            <div className="relative flex-1">
                                                <Key className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600" />
                                                <input type="password" placeholder="Update Access Key" value={newAdminPass} onChange={e => setNewAdminPass(e.target.value)} className="w-full bg-black border border-white/5 rounded-2xl p-4 pl-12 text-sm focus:border-brand outline-none" />
                                            </div>
                                            <button className="bg-white/5 border border-white/10 px-8 rounded-2xl hover:bg-white/10 hover:text-brand transition-all font-black text-[10px] uppercase tracking-widest">Update</button>
                                        </form>
                                    </div>
                                </div>
                            )}
                        </div>
                    </motion.div>
                </motion.div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
